<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Drift — Concept A: Centered Hero</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* ARCHETYPE: Centered hero.
     Single dominant focal element at canvas center: an oversized
     "Sign & Approve" button — the exact moment of decision. Title
     orbits above as a question. Symmetrical composition. */

  .canvas { background: #050706; }

  .topbar {
    position: absolute; top: 80px; left: 0; right: 0;
    font-family: var(--mono); font-size: 15px;
    color: var(--muted); letter-spacing: 0.3em; text-transform: uppercase;
    text-align: center;
  }
  .topbar .red {
    color: var(--warning);
    padding: 8px 20px;
    border: 1px solid rgba(255,59,48,0.4);
    border-radius: 3px;
  }

  .question {
    position: absolute; top: 240px; left: 0; right: 0;
    text-align: center;
    font-family: var(--display);
    font-size: 96px; font-weight: 700;
    color: var(--text); letter-spacing: -0.03em; line-height: 1.05;
  }
  .question .green { color: var(--accent); }

  .focal {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .focal-button {
    background: var(--accent); color: #000;
    padding: 52px 120px;
    border-radius: 12px;
    font-family: var(--display); font-size: 78px; font-weight: 800;
    letter-spacing: -0.01em;
    box-shadow:
      0 0 80px rgba(0,230,118,0.6),
      0 0 160px rgba(0,230,118,0.3);
    display: inline-block;
  }
  .focal-meta {
    margin-top: 40px;
    font-family: var(--mono); font-size: 18px;
    color: var(--muted-strong); letter-spacing: 0.25em; text-transform: uppercase;
  }
  .focal-meta .red { color: var(--warning); }

  .punch {
    position: absolute; bottom: 200px; left: 0; right: 0;
    text-align: center;
    font-family: var(--display); font-weight: 800;
    font-size: 52px;
    color: var(--text); letter-spacing: -0.02em;
  }
  .punch .acc { color: var(--accent); }
  .punch .red { color: var(--warning); }

  .source {
    position: absolute; bottom: 140px; left: 0; right: 0;
    text-align: center;
    font-family: var(--mono); font-size: 15px;
    color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase;
  }

  .brand-logo { bottom: 60px; left: 100px; }
  .brand-url { bottom: 68px; right: 100px; }
</style></head>
<body>
<div class="canvas">

  <div class="topbar">
    <span class="red">Drift Protocol · April 2026 · Case Reconstruction</span>
  </div>

  <div class="question">
    When does <span class="green">approve</span><br>
    become the attack?
  </div>

  <div class="focal">
    <div class="focal-button">Sign &amp; Approve</div>
    <div class="focal-meta">
      Multisig proposal #847 · <span class="red">$285M drain on click</span>
    </div>
  </div>

  <div class="punch">
    Six months of trust. <span class="red">Twelve minutes</span> to <span class="acc">approve.</span>
  </div>

  <div class="source">
    Source: DPRK Lazarus attribution · post-mortem analysis
  </div>

  <div class="brand-logo">
    <svg viewBox="0 0 202 202"><path d="M100.94 0.0996094H201.58V201.38L100.94 100.74V0.0996094Z" fill="white"/><path d="M100.94 201.38H0.299805V0.0996094L100.94 100.74V201.38Z" fill="white"/></svg>
    <span class="wordmark">NexGuards</span>
  </div>
  <div class="brand-url">nexguards.com/blog</div>

</div>
</body></html>
